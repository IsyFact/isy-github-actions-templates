name: Trigger Documentation Build Template

on:
  workflow_call:
    inputs:
      log_level:
        description: 'Log severity level for the Antora build (debug, info, warn, error)'
        required: false
        type: string
        default: 'info'
      failure_level:
        description: 'Log failure level for the Antora build (fatal, error, warn, none)'
        required: false
        type: string
        default: 'fatal'
    secrets:
      ANTORA_TRIGGER_TOKEN:
        description: 'GitHub token to trigger the documentation build'
        required: true

jobs:
  TriggerDocsBuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          fetch-depth: 0

      - name: Check if PR contains changes in AsciiDoc files
        id: adoc-changes
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q ".adoc"; then
            echo "pr_build=true" >> $GITHUB_OUTPUT
          else
            echo "pr_build=false" >> $GITHUB_OUTPUT
          fi
      - name: Check if PR contains changes in the repository IsyFact/isyfact.github.io (playbook, UI, extensions)
        id: meta-changes
        if: ${{ steps.adoc-changes.outputs.pr_build == 'false' &&  github.repository == 'IsyFact/isyfact.github.io' }}
        run: |
          echo "pr_build=true" >> $GITHUB_OUTPUT

      - name: Trigger documentation build
        uses: codex-/return-dispatch@v2.1.0
        id: trigger_build
        if: github.event_name == 'push' || steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        with:
          token: ${{ secrets.ANTORA_TRIGGER_TOKEN }}
          ref: main
          repo: isyfact.github.io
          owner: IsyFact
          workflow: antora_build.yml
          workflow_inputs: |
            {
              "log_level": "${{ inputs.log_level }}",
              "failure_level": "${{ inputs.failure_level }}",
              "pr_repo": "${{ github.repository }}",
              "pr_branch": "${{ github.ref }}",
              "pr_target": "${{ github.base_ref }}"
            }

      - name: Wait for documentation build completion (Run ID - ${{ steps.trigger_build.outputs.run_id }})
        uses: codex-/await-remote-run@v1.13.0
        id: wait_for_completion
        if: github.event_name == 'push' || steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        continue-on-error: true
        with:
          token: ${{ secrets.ANTORA_TRIGGER_TOKEN }}
          repo: isyfact.github.io
          owner: IsyFact
          run_id: ${{ steps.trigger_build.outputs.run_id }}
          run_timeout_seconds: 1200 # 20 minutes (optional)
          poll_interval_ms: 30000 # 30 seconds (optional)

      - name: Fetch Antora log
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.ANTORA_TRIGGER_TOKEN }}
          RUN_ID: ${{ steps.trigger_build.outputs.run_id }}
        run: |
          # Fetch the logs for the given run ID using GitHub CLI
          echo "Fetching Antora log for run ID: $RUN_ID from repository IsyFact/isyfact.github.io..."
          gh run download ${{ env.RUN_ID }} -n "antora-log" --repo "IsyFact/isyfact.github.io"
          mv antora_output.log antora_triggered_run.log

      - name: Fetch Antora log for production (latest successful scheduled build)
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.ANTORA_TRIGGER_TOKEN }}
        run: |
          # Fetch the logs for the given run ID using GitHub CLI
          echo "Fetching latest production log for run ID"
          latest_run_id=$(gh run list --repo IsyFact/isyfact.github.io -w "Build Documentation" -s success -e schedule -L 1 --json databaseId -q ".[0].databaseId") 
          gh run download $latest_run_id -n "antora-log" --repo "IsyFact/isyfact.github.io" 
          mv antora_output.log antora_latest_run.log
          cat antora_latest_run.log

      - name: Compute fixed and introduced log messages
        id: compute-pr-production-diff
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        run: |
          # Normalize the timestamp to 0 in each JSON line.
          # Otherwise the timestamps cause `comm` to flag virtually every line as fixed or introduced.
          normalize_time='s/"time":[0-9]+/"time":0/g'

          grep '^{' antora_latest_run.log    | sed -E "$normalize_time" | LC_ALL=C sort -u > latest_sorted.log    || true
          grep '^{' antora_triggered_run.log | sed -E "$normalize_time" | LC_ALL=C sort -u > triggered_sorted.log || true

          comm -23 latest_sorted.log triggered_sorted.log > antora_fixed.log
          comm -13 latest_sorted.log triggered_sorted.log > antora_introduced.log

          echo "Fixed messages:      $(wc -l < antora_fixed.log)"
          echo "Introduced messages: $(wc -l < antora_introduced.log)"

      - name: Generate comment for documentation build results
        id: generate-pr-comment
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        run: |
          echo "Processing Antora log diff..."

          output_file="formatted_logs.md"
          echo "## Build Documentation Logs 📜" > "$output_file"

          # Keep track of the build success, according to the failure_level (workflow input).
          # Only messages INTRODUCED by this PR may flip this flag to false.
          build_successful=true

          # Args: $1 = input file (JSON lines), $2 = section title, $3 = "true" if findings should fail the build
          render_section() {
            local input_file="$1"
            local section_title="$2"
            local fail_on_findings="$3"

            echo "" >> "$output_file"
            if [[ -n "$section_title" ]]; then
              echo "### $section_title" >> "$output_file"
            fi

            local current_source=""
            local current_branch=""
            local in_block=false

            while IFS= read -r line; do

              if [[ $line != {* ]]; then
                continue
              fi

              level=$(echo "$line" | jq -r '.level')

              if [[ "$level" = "fatal" ]]; then
                line_text=$(echo "$line" | jq -r '"\(.level | ascii_upcase) \(.msg)"')
                if [[ "$in_block" = true ]]; then
                  echo "</details>" >> "$output_file"
                  in_block=false
                fi
                echo "<strong>❌ $line_text</strong>" >> "$output_file"
                # fatal errors fail the build in each case (only when introduced)
                if [[ "$fail_on_findings" = "true" ]]; then
                  build_successful=false
                fi
                continue
              fi

              # Extract the source and branch information
              source=$(echo "$line" | jq -r '.source.url // empty' | awk -F'/' '{print $NF}')
              branch=$(echo "$line" | jq -r '.source.refname // empty')

              # Use the last part of the worktree if the ref points to HEAD (i.e. in case of a tag)
              if [[ "$branch" = "HEAD" ]]; then
                worktree=$(echo "$line" | jq -r '.source.worktree')
                branch="${worktree##*/}"
              fi

              # If the source or branch is missing, skip this line
              if [[ -z "$source" || -z "$branch" ]]; then
                echo "::notice title=Skipping line: $line"
                continue
              fi

              # Check if the source or branch has changed
              if [[ "$source" != "$current_source" || "$branch" != "$current_branch" ]]; then
                current_source="$source"
                current_branch="$branch"

                if [[ "$in_block" = true ]]; then
                  echo "</details>" >> "$output_file"
                fi
                echo "<details>" >> "$output_file"
                echo "<summary><strong>📁 Content Source: $current_source (branch: $current_branch)</strong></summary>" >> "$output_file"
                echo "" >> "$output_file"
                in_block=true
              fi

              # Write first line (level and message)
              first_line=$(echo "$line" | jq -r '"- \(.level): \(.msg)"')

              case "$level" in
                error*)
                  echo "${first_line//error:/🔴 **ERROR**}" >> "$output_file"
                  if [[ "$fail_on_findings" = "true" ]] && \
                     [[ "${{ inputs.failure_level }}" = "error" || "${{ inputs.failure_level }}" = "warn" ]]; then
                    build_successful=false
                  fi
                  ;;
                warn*)
                  echo "${first_line//warn:/🟡 **WARN**}" >> "$output_file"
                  if [[ "$fail_on_findings" = "true" ]] && [[ "${{ inputs.failure_level }}" = "warn" ]]; then
                    build_successful=false
                  fi
                  ;;
                info)
                  echo "${first_line//info:/🟢 **INFO**}" >> "$output_file"
                  ;;
                debug*)
                  echo "${first_line//debug:/🔵 **DEBUG**}" >> "$output_file"
                  ;;
              esac

              # Write second line (file and line)
              second_line=$(echo "$line" | jq -r '"    - File: `\(.file.path? // "N/A" | sub("^/home/runner/work/isyfact.github.io/isyfact.github.io/"; ""))`:\(.file.line // "N/A")\n"')
              echo "$second_line" >> "$output_file"

            done < "$input_file"

            if [[ "$in_block" = true ]]; then
              echo "</details>" >> "$output_file"
            fi
          
            if [[ "$current_source" = "" ]]; then
              echo "None." >> "$output_file"
              return
            fi


          }

          # Sort the diff outputs by source/branch so the section grouping works as before.
          sort_by_source() {
            local f="$1"
            [[ -s "$f" ]] || return 0
            jq -c '[(.source.url // ""), (.source.refname // ""), .]' "$f" \
              | LC_ALL=C sort -u \
              | jq -c '.[2]' > "$f.sorted"
            mv "$f.sorted" "$f"
          }

          sort_by_source antora_fixed.log
          sort_by_source antora_introduced.log
          sort_by_source triggered_sorted.log

          render_section "antora_fixed.log" "✅ Fixed by this PR" "false"
          render_section "antora_introduced.log" "⚠️ Introduced by this PR" "true"

          echo "### ℹ️ Complete Log" >> "$output_file"
          echo "<details>" >> "$output_file"
          echo "<summary><strong>Log messages by content source</strong></summary>" >> "$output_file"
          if [[ "$build_successful" = true ]]; then
            render_section "triggered_sorted.log" "" "false"
          else
            render_section "triggered_sorted.log" "" "false"
          fi
          echo "</details>" >> "$output_file"

          cat formatted_logs.md

          echo "success=$build_successful" >> $GITHUB_OUTPUT
          
      - name: Comment on PR for documentation build results
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          file-path: formatted_logs.md
          comment-tag: antora-logs

      - name: Fetch diagram log
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        env:
          GH_TOKEN: ${{ secrets.ANTORA_TRIGGER_TOKEN }}
          RUN_ID: ${{ steps.trigger_build.outputs.run_id }}
        run: |
          # Fetch the logs for the given run ID using GitHub CLI
          echo "Fetching diagram log for run ID: $RUN_ID from repository IsyFact/isyfact.github.io..."
          gh run download ${{ env.RUN_ID }} -n "diagram-log" --repo "IsyFact/isyfact.github.io"

      - name: Generate comment for disabled dark mode support in diagrams
        id: generate-pr-comment-dark-mode
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        run: |
          echo "Processing diagram log..."
          
          input_file="diagrams_with_enabled_adaptive_colors.log"
          output_file="diagrams_check_result.md"
          
          echo "## Diagram Check 📊" > "$output_file"
          echo "### Adaptive Color Support Turned Off" >> "$output_file"
          echo "How to turn off adaptive color support for a diagram is described in the [documentation guide](https://isyfact.github.io/documentation-guide/current/seitenbearbeitung.html#draw.io)." >> "$output_file"
          
          # Keep track of the current source and branch
          current_source=""
          current_branch=""
          # Keep track of the block state
          in_block=false
          # Keep track of the build success, according to the failure_level (workflow input)
          build_successful=true
          
          while IFS= read -r line; do
        
            # Extract the source information (content sources using Antora cache)
            source=$(echo "$line" | sed -E 's|.*/content-with-lfs/([^/]+)-[0-9a-f]{40}/.*|\1|')
        
            if [[ "$source" == "$line" ]]; then
              # Special case for isyfact-standards
              source=$(echo "$line" | sed -E 's|^\./?([^/]+)/.*|\1|')
            fi
            # If the previous attempts didn't match anything, skip this line
            if [[ "$source" == "$line" ]]; then
              echo "::notice title=Skipping line: $line"
              continue
            fi
        
            # Extract the branch from the source.
            branch=$(echo "$source" | sed -E 's/.*-([^ -]+)$/\1/')
          
            if [[ "$branch" == "standards" ]]; then
              # Special case for isyfact-standards (master)
              branch="master"
            else
              # All other cases: cut branch from source
              source="${source%-"${branch}"}"
            fi
          
            # Check if the source or branch has changed
            if [[ "$source" != "$current_source" || "$branch" != "$current_branch" ]]; then
              # Update the current source and branch
              current_source="$source"
              current_branch="$branch"
              
              # Close previous details block if it's not the first one
              if [[ "$in_block" = true ]]; then
                echo "</details>" >> "$output_file"
              fi
              # Start a new details block for a new source
              echo "<details>" >> "$output_file"
              echo "<summary><strong>📁 Content Source: $current_source (branch: $current_branch)</strong></summary>" >> "$output_file"
              echo "" >> "$output_file"  # Add a new line for formatting
              in_block=true
            fi
          
            echo "- 🔴 **ERROR** diagram with adaptive colors and support turned on" >> "$output_file"
          
            # Extract the path inside the repository
            short_line=$(echo "$line" | sed -E 's|.*/content-with-lfs/[^/]+-[0-9a-f]{40}(/.*)|\1|')
            # Special case for isyfact-standards
            if [[ "$short_line" == "$line" ]]; then
              short_line=$(echo "$line" | sed -E 's|^\./?[^/]+(/.*)|\1|')
            fi
            echo "    - File: $short_line" >> "$output_file"
          
            if [[ "${{ inputs.failure_level }}" = "error" || "${{ inputs.failure_level }}" = "warn" ]]; then
              build_successful=false
            fi
          
          done < "$input_file"
          
          cat diagrams_check_result.md
  
          echo "success=$build_successful" >> $GITHUB_OUTPUT

      - name: Comment on PR for disabled dark mode support in diagrams
        if: steps.adoc-changes.outputs.pr_build == 'true' || steps.meta-changes.outputs.pr_build == 'true'
        uses: thollander/actions-comment-pull-request@v3.0.1
        with:
          file-path: diagrams_check_result.md
          comment-tag: diagrams-check-result

      - name: Fail check if documentation build failed
        if: ${{ steps.generate-pr-comment.outputs.success == 'false' }}

        run: exit 1
